name: "Build and Publish Artifacts"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  proto_build_and_check:
    name: Build and Check Protos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Buf CLI
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: Lint .proto Files
        run: buf lint
      - name: Format .proto Files
        run: buf format ./proto/ --diff --exit-code
      - name: Check Breaking Changes
        run: buf breaking --against "https://github.com/${GITHUB_REPOSITORY}.git#branch=main"
      - name: Generate Client Libs
        run: |
          buf generate --template buf.gen.ci.yaml
          cd build/proto/swift
          zip -r ${{ github.workspace }}/build/swift-client-lib.zip ./*
      - name: Upload Generated Client Libs as CI Artifact
        uses: actions/upload-artifact@v5
        if: github.ref == 'refs/heads/main'
        with:
          name: pubgolf-client-libs
          path: build/swift-client-lib.zip

  tools_build_and_check:
    name: Build and Check Tools
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: ./tools/...
          skip-cache: true
      - name: Test
        run: go test ./tools/lib/...
      - name: Build
        run: GOOS=darwin GOARCH=amd64 go build -v ./tools/cmd/pubgolf-devctrl
      - name: Upload Built Tools as CI Artifact
        uses: actions/upload-artifact@v5
        if: github.ref == 'refs/heads/main'
        with:
          name: pubgolf-devctrl
          path: pubgolf-devctrl

  api_build_and_check:
    name: Build and Check API Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: ./api/...
          skip-cache: true
      - name: Test
        run: go test ./api/...
      - name: Build API Server Binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -v ./api/cmd/pubgolf-api-server
      - name: Upload API Server Binary as CI Artifact
        uses: actions/upload-artifact@v5
        if: github.ref == 'refs/heads/main'
        with:
          name: pubgolf-api-server
          path: pubgolf-api-server

  api_e2e_test:
    name: Run E2E Tests
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v4
      - name: Run E2E Tests
        run: go test ./api/internal/e2e -v -e2e=true
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_E2E_TOKEN }}

  web_app_build_and_check:
    name: Build and Check Web App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: npm
          cache-dependency-path: web-app/package-lock.json
      - name: Cache devctrl binary
        id: devctrl-cache
        uses: actions/cache@v5
        with:
          path: pubgolf-devctrl
          key: devctrl-${{ runner.os }}-${{ hashFiles('go.sum', 'tools/**') }}
      - name: Set up Go
        if: steps.devctrl-cache.outputs.cache-hit != 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Build devctrl
        if: steps.devctrl-cache.outputs.cache-hit != 'true'
        run: go build -o pubgolf-devctrl ./tools/cmd/pubgolf-devctrl
      - name: Get cache week key
        id: cache-date
        run: echo "week=$(date +%Y-%W)" >> "$GITHUB_OUTPUT"
      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v5
        with:
          path: web-app/node_modules
          key: node-modules-${{ runner.os }}-${{ steps.cache-date.outputs.week }}-${{ hashFiles('web-app/package-lock.json') }}
      - name: Install Web Dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: ./pubgolf-devctrl install web
      - name: Run Web Unit Tests
        run: ./pubgolf-devctrl test web
      - name: Run Web App Checks
        run: ./pubgolf-devctrl check web
      - name: Build Web App
        run: ./pubgolf-devctrl build web
      - name: Upload Assets to R2
        if: github.ref == 'refs/heads/main'
        run: |
          aws s3 sync web-app/build/_app/immutable/ \
            s3://pubgolf-web-app-assets/_app/immutable/ \
            --endpoint-url "$AWS_S3_ENDPOINT"
        env:
          AWS_S3_ENDPOINT: https://cc720e9866469bbe052e0c3d90b4c016.r2.cloudflarestorage.com
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
      - name: Upload Web App Dynamic Files as CI Artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v5
        with:
          name: pubgolf-web-app
          path: |
            web-app/build/
            !web-app/build/_app/immutable/

  publish_gh_release:
    name: Publish Protos and Tools
    if: github.ref == 'refs/heads/main'
    needs:
      - proto_build_and_check
      - tools_build_and_check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Generated RPC Client Libs
        uses: actions/download-artifact@v5
        with:
          name: pubgolf-client-libs
      - name: Download pubgolf-devctrl Tool
        uses: actions/download-artifact@v5
        with:
          name: pubgolf-devctrl
      - name: Get short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV
      - name: Upload as GitHub Release
        run: |
          gh release create "sha-${{ env.SHORT_SHA }}" \
            --repo "$GITHUB_REPOSITORY" \
            swift-client-lib.zip \
            pubgolf-devctrl
        env:
          GH_TOKEN: ${{ github.token }}

  api_publish_docker_image:
    name: Publish API Server
    if: github.ref == 'refs/heads/main'
    needs:
      - proto_build_and_check
      - api_build_and_check
      - api_e2e_test
      - web_app_build_and_check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Auth with Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/pubgolf/pubgolf
          tags: |
            type=sha
      - name: Download API Server Binary as CI Artifact
        uses: actions/download-artifact@v5
        with:
          name: pubgolf-api-server
      - name: Download Web App Dynamic Files as CI Artifact
        uses: actions/download-artifact@v5
        with:
          name: pubgolf-web-app
          path: web-app-content
      - name: Build and push Docker Image
        uses: docker/build-push-action@v6
        with:
          push: true
          file: ./infra/Dockerfile
          context: ./
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trigger_staging_deploy:
    name: Trigger Staging Deploy for App
    if: github.ref == 'refs/heads/main'
    needs:
      - api_publish_docker_image
    runs-on: ubuntu-latest
    steps:
      - name: Get short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV
      - name: Trigger Deployment Workflow
        run: |
          gh workflow run deploy-staging.yaml \
            --repo "$GITHUB_REPOSITORY" \
            -f version=sha-${{ env.SHORT_SHA }}
        env:
          GH_TOKEN: ${{ github.token }}
