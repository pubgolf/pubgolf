version: "2"
linters:
  default: all
  disable:
    - cyclop
    - depguard
    - dogsled
    - dupl
    - exhaustruct
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - gocognit
    - goconst
    - godox
    - lll
    - maintidx
    - mnd
    - prealloc
    - rowserrcheck
    - tagalign
    - tagliatelle
    - testpackage
    - unparam
    - unused
    - varnamelen
    - wsl
  settings:
    modernize:
      disable:
        - newexpr
    exhaustive:
      check:
        - switch
        - map
    recvcheck:
      exclusions:
        - "*.Value"
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # golangci-lint bug: ireturn reports at an off-by-one line inside the
      # function body when ./api/... and ./tools/... are linted together,
      # making inline //nolint directives insufficient.
      - linters:
          - ireturn
        text: "runE2ETest returns interface"
        path: tools/lib/cmd/test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
      - \.worktrees
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - blank
        - prefix(github.com/pubgolf/pubgolf)
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
